<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="ad.size" content="width=320,height=480">
<title>SPLIT</title>
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:#030d26;font-family:Arial,sans-serif;overflow:hidden;touch-action:none;display:flex;justify-content:center;align-items:center;height:100vh}#gameWrapper{position:relative;width:100%;max-width:390px;height:100%;max-height:844px;background:#030d26}canvas{display:block;width:100%;height:100%}.screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;background:rgba(3,13,38,.95);backdrop-filter:blur(12px);transition:opacity .5s}.screen.hidden{opacity:0;pointer-events:none}.logo{font-size:96px;font-weight:900;margin-bottom:30px;letter-spacing:16px;line-height:.9;font-family:'Arial Black',Arial,sans-serif}.logo-sp{color:#00a1f7}.logo-l{color:#f92969}.logo-it{color:#d0dce8}.tagline{font-size:16px;color:rgba(160,180,210,.8);margin-bottom:25px;text-align:center;letter-spacing:2px;text-transform:uppercase}.stats{display:flex;flex-direction:column;gap:12px;margin-bottom:30px;align-items:center}.stat-line{font-size:24px;font-weight:700;text-align:center}.stat-best{color:#fff}.stat-coins{color:#00a1f7}.stat-online{color:#55b98a;font-size:16px;display:flex;align-items:center;gap:8px}.online-dot{width:10px;height:10px;border-radius:50%;background:#55b98a;display:inline-block}.btn{background:#00a1f7;color:#fff;border:none;padding:18px 60px;font-size:20px;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(0,161,247,.4);transition:transform .2s;text-transform:uppercase;letter-spacing:2px}.btn:active{transform:scale(.95)}#score{position:absolute;top:30px;left:50%;transform:translateX(-50%);font-size:48px;font-weight:700;color:rgba(0,161,247,.5);transition:color .2s;z-index:5;pointer-events:none}#score.active{color:#00a1f7}.finalScore{font-size:36px;color:#00a1f7;margin:20px 0}</style>
</head>
<body>
<script src="mraid.js"></script>
<div id="gameWrapper">
<canvas id="canvas"></canvas>
<div id="score">0</div>
<div class="screen" id="startScreen">
<div class="logo"><span class="logo-sp">SP</span><span class="logo-l">L</span><span class="logo-it">IT</span></div>
<div class="tagline">ONE TAP - TWO PATHS</div>
<div class="stats">
<div class="stat-line stat-best">BEST 47</div>
<div class="stat-line stat-coins">COINS 1676</div>
<div class="stat-line stat-online"><span class="online-dot"></span><span>ONLINE - RANKED</span></div>
</div>
<button class="btn" onclick="startGame()">TAP TO PLAY</button>
</div>
<div class="screen hidden" id="endScreen">
<div class="logo" style="font-size:48px">GAME OVER</div>
<div class="finalScore">Score: <span id="finalScore">0</span></div>
<button class="btn" id="tryAgainBtn" onclick="startGame()" style="margin-bottom:15px">TRY AGAIN</button>
<button class="btn" onclick="install()">INSTALL NOW</button>
</div>
</div>
<script>
// MRAID initialization
(function(){
if(typeof mraid==='undefined'){
console.log('MRAID not available - creating mock');
window.mraid={getState:function(){return'default'},addEventListener:function(){},removeEventListener:function(){},open:function(url){window.open(url,'_blank')},useCustomClose:function(){}};
}
if(mraid.getState()==='loading'){
mraid.addEventListener('ready',initAd);
}else{
initAd();
}
function initAd(){
console.log('MRAID ready');
}
})();

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const wrapper=document.getElementById('gameWrapper');
let W,H;
function resize(){W=wrapper.clientWidth;H=wrapper.clientHeight;canvas.width=W;canvas.height=H}
resize();
window.addEventListener('resize',resize);

const C={BLUE:'#00a1f7',PINK:'#f92967',BG:'#030d26',WALLS:['rgb(0,150,145)','rgb(30,140,100)','rgb(170,145,40)','rgb(180,100,45)','rgb(155,50,110)','rgb(180,65,65)','rgb(110,60,165)','rgb(65,75,170)','rgb(45,165,140)','rgb(50,120,190)']};

let lastTime=performance.now();
const TARGET_FPS=60;
const FRAME_TIME=1000/TARGET_FPS;

let state='start',score=0,speed=3.2,splitMode=false,obstacles=[],frameCount=0;
let deathCount=0;
const BALL_R=14,SPLIT_DIST=52,GRAVITY=.38,FLAP=-7.5,WALL_H=28;
let ballA={x:0,y:0,r:BALL_R,vx:0,vy:0,alive:true};
let ballB={x:0,y:0,r:BALL_R,vx:0,vy:0,alive:true};

function resetBalls(){ballA.x=W/2-SPLIT_DIST;ballA.y=H*.72;ballA.vx=0;ballA.vy=0;ballA.alive=true;ballB.x=W/2+SPLIT_DIST;ballB.y=H*.72;ballB.vx=0;ballB.vy=0;ballB.alive=true}

function spawnObstacle(){const type=(obstacles.length%2===0)?'single':'double';const y=-WALL_H;const centerX=W/2;if(type==='single'){const gapW=90+Math.random()*30;const gapX=centerX-gapW/2;obstacles.push({type:'single',y,gapX,gapW,scored:false})}else{const gapW=70;const gapAx=(centerX-SPLIT_DIST)-gapW/2;const gapBx=(centerX+SPLIT_DIST)-gapW/2;obstacles.push({type:'double',y,gapAx,gapAw:gapW,gapBx,gapBw:gapW,scored:false})}}

function drawBall(x,y,color,isMerged=false){ctx.save();if(isMerged){ctx.shadowBlur=20;ctx.shadowColor=C.PINK;ctx.fillStyle=C.BLUE}else{ctx.shadowBlur=16;ctx.shadowColor=color;ctx.fillStyle=color}ctx.beginPath();ctx.arc(x,y,BALL_R,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=.3;ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(x-BALL_R*.3,y-BALL_R*.3,BALL_R*.35,0,Math.PI*2);ctx.fill();ctx.restore()}

function drawObstacle(obs){const y=obs.y;const colorIndex=Math.min(Math.floor(score/5),C.WALLS.length-1);const wallColor=C.WALLS[colorIndex];ctx.fillStyle=wallColor;ctx.shadowBlur=5;ctx.shadowColor='rgba(0,0,0,0.5)';if(obs.type==='single'){ctx.fillRect(0,y,obs.gapX,WALL_H);ctx.fillRect(obs.gapX+obs.gapW,y,W-obs.gapX-obs.gapW,WALL_H);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(0,y,obs.gapX,2);ctx.fillRect(obs.gapX+obs.gapW,y,W-obs.gapX-obs.gapW,2)}else{const midX=obs.gapAx+obs.gapAw;const midW=obs.gapBx-midX;ctx.fillRect(0,y,obs.gapAx,WALL_H);if(midW>0)ctx.fillRect(midX,y,midW,WALL_H);ctx.fillRect(obs.gapBx+obs.gapBw,y,W-obs.gapBx-obs.gapBw,WALL_H);ctx.shadowBlur=0;ctx.fillStyle=C.PINK;ctx.fillRect(0,y,obs.gapAx,2);ctx.fillStyle=wallColor;if(midW>0)ctx.fillRect(midX,y,midW,2);ctx.fillStyle=C.BLUE;ctx.fillRect(obs.gapBx+obs.gapBw,y,W-obs.gapBx-obs.gapBw,2)}ctx.shadowBlur=0}

function checkCollision(obs){const hitLine=(ball,obs)=>ball.y+ball.r>obs.y&&ball.y-ball.r<obs.y+WALL_H;if(obs.type==='single'){if(!splitMode){const cx=(ballA.x+ballB.x)/2,cy=(ballA.y+ballB.y)/2;if(cy+BALL_R>obs.y&&cy-BALL_R<obs.y+WALL_H){const inGap=cx+BALL_R>obs.gapX&&cx-BALL_R<obs.gapX+obs.gapW;if(!inGap)gameOver()}}else{[ballA,ballB].forEach(b=>{if(hitLine(b,obs))gameOver()})}}else{if(!splitMode){const cx=(ballA.x+ballB.x)/2,cy=(ballA.y+ballB.y)/2;if(cy+BALL_R>obs.y&&cy-BALL_R<obs.y+WALL_H)gameOver()}else{[ballA,ballB].forEach(b=>{if(hitLine(b,obs)){const inA=b.x+b.r>obs.gapAx&&b.x-b.r<obs.gapAx+obs.gapAw;const inB=b.x+b.r>obs.gapBx&&b.x-b.r<obs.gapBx+obs.gapBw;if(!inA&&!inB)gameOver()}})}}}

function gameUpdate(deltaTime){frameCount++;speed=Math.min(3.2+score*.12,8.5);const dt=deltaTime;if(splitMode){[ballA,ballB].forEach(b=>{b.vy+=GRAVITY*dt;b.y+=b.vy*dt})}else{const cx=(ballA.x+ballB.x)/2,cy=(ballA.y+ballB.y)/2;ballA.vy+=GRAVITY*dt;const newY=cy+ballA.vy*dt;ballA.x=cx-SPLIT_DIST;ballA.y=newY;ballB.x=cx+SPLIT_DIST;ballB.y=newY;ballB.vy=ballA.vy}[ballA,ballB].forEach(b=>{if(b.y-b.r>H||b.y+b.r<0)gameOver()});obstacles.forEach(obs=>{obs.y+=speed*dt});const spawnInterval=Math.max(120,160-score*2);if(frameCount%Math.floor(spawnInterval)===0)spawnObstacle();obstacles.forEach(obs=>{if(!obs.scored&&obs.y>ballA.y){obs.scored=true;score++;document.getElementById('score').textContent=score;document.getElementById('score').classList.add('active');setTimeout(()=>document.getElementById('score').classList.remove('active'),300)}checkCollision(obs)});obstacles=obstacles.filter(o=>o.y<H+60)}

function render(){ctx.fillStyle=C.BG;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(30,50,90,0.3)';ctx.lineWidth=1;ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);obstacles.forEach(drawObstacle);if(splitMode){ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([3,7]);ctx.beginPath();ctx.moveTo(ballA.x,ballA.y);ctx.lineTo(ballB.x,ballB.y);ctx.stroke();ctx.setLineDash([]);drawBall(ballA.x,ballA.y,C.PINK);drawBall(ballB.x,ballB.y,C.BLUE)}else{const cx=(ballA.x+ballB.x)/2,cy=(ballA.y+ballB.y)/2;drawBall(cx,cy,'#a040ff',true)}}

function loop(){if(state==='playing'){const now=performance.now();const elapsed=now-lastTime;const deltaTime=elapsed/FRAME_TIME;lastTime=now;gameUpdate(deltaTime);render()}requestAnimationFrame(loop)}

function handleTap(){if(state!=='playing')return;if(!splitMode){splitMode=true;const cx=(ballA.x+ballB.x)/2;ballA.x=cx-SPLIT_DIST;ballB.x=cx+SPLIT_DIST;ballA.vy=FLAP;ballB.vy=FLAP}else{const cx=(ballA.x+ballB.x)/2,cy=(ballA.y+ballB.y)/2;splitMode=false;ballA.x=cx-SPLIT_DIST;ballB.x=cx+SPLIT_DIST;ballA.y=ballB.y=cy;ballA.vy=ballB.vy=FLAP}}

function startGame(){score=0;frameCount=0;speed=3.2;splitMode=false;obstacles=[];lastTime=performance.now();document.getElementById('score').textContent='0';resetBalls();state='playing';document.getElementById('startScreen').classList.add('hidden');document.getElementById('endScreen').classList.add('hidden')}

function gameOver(){if(state!=='playing')return;state='end';deathCount++;setTimeout(()=>{document.getElementById('finalScore').textContent=score;const tryAgainBtn=document.getElementById('tryAgainBtn');if(deathCount<3){tryAgainBtn.style.display='inline-block'}else{tryAgainBtn.style.display='none'}document.getElementById('endScreen').classList.remove('hidden')},500)}

function install(){
const storeUrl='https://play.google.com/store/apps/details?id=com.nasije.split';
if(typeof mraid!=='undefined'&&mraid.open){
mraid.open(storeUrl);
}else{
window.open(storeUrl,'_blank');
}
}

canvas.addEventListener('pointerdown',handleTap);
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleTap()}});

resetBalls();
loop();
</script>
</body>
</html>
